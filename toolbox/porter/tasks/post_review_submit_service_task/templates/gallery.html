<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>搬牛 - 帖子综合审核</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, Segoe UI, "PingFang SC", "Microsoft YaHei", sans-serif; margin: 0; background: #f0f2f5; color: #1d2129; }
    .wrap { max-width: 1600px; margin: 0 auto; padding: 20px 16px; }
    .header { background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%); color: #fff; padding: 20px 28px; border-radius: 14px; margin-bottom: 20px; }
    .header h1 { margin: 0 0 6px; font-size: 22px; font-weight: 600; }
    .header p { margin: 0; opacity: 0.85; font-size: 13px; }

    .filter-summary { font-size: 12px; color: #8c8c8c; width: 100%; margin-top: 2px; }
    .row.filter-hidden { display: none !important; }
    .row.paginate-hidden { display: none !important; }
    #paginateSentinel { height: 1px; }
    #paginateLoading {
      display: none;
      text-align: center;
      color: #8c8c8c;
      font-size: 12px;
      padding: 12px 0 4px;
    }
    #paginateLoading.show { display: block; }
    .search-empty-hint {
      display: none;
      background: #fff;
      border-radius: 12px;
      padding: 28px;
      text-align: center;
      color: #8c8c8c;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .search-empty-hint.show { display: block; }

    .filter-bar {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      padding: 14px 16px;
      margin-bottom: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px 16px;
      align-items: flex-end;
    }
    .filter-bar .filter-title { width: 100%; font-size: 13px; font-weight: 600; color: #1d2129; }
    .filter-bar .filter-group { display: flex; flex-direction: column; gap: 4px; min-width: 140px; }
    .filter-bar .filter-group.keyword { min-width: 220px; flex: 1 1 240px; }
    .filter-bar .filter-group.range { min-width: 180px; }
    .filter-bar label { font-size: 12px; color: #606266; }
    .filter-bar select,
    .filter-bar input[type="datetime-local"],
    .filter-bar input[type="search"] {
      height: 32px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      padding: 0 8px;
      font-size: 13px;
      color: #1d2129;
      background: #fff;
    }
    .filter-bar .filter-actions { display: flex; gap: 8px; margin-left: auto; }
    .filter-bar .filter-btn {
      height: 32px;
      padding: 0 14px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      color: #333;
    }
    .filter-bar .filter-btn:hover { background: #f5f5f5; }
    .filter-bar .filter-btn.primary { border-color: #1677ff; background: #1677ff; color: #fff; }
    .filter-bar .filter-btn.primary:hover { background: #0958d9; }

    .rows { display: flex; flex-direction: column; gap: 14px; }
    .row {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      overflow: hidden;
      display: grid;
      grid-template-columns: 496px minmax(0, 1fr) 268px;
    }
    .row.removing { opacity: 0; transform: translateY(-8px) scale(.985); max-height: 0; margin: 0; padding: 0; border: 0; transition: opacity .2s ease, transform .22s ease, max-height .28s ease, margin .28s ease, padding .28s ease; }

    .panel-head {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .3px;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(0,0,0,.06);
      flex-shrink: 0;
    }
    .panel-body { padding: 12px; min-width: 0; flex: 1; overflow: hidden; }

    .post-banniu {
      display: flex;
      flex-direction: column;
      font-size: 12px;
      line-height: 1.6;
      background: #fffbf5;
      border-right: 1px solid #f0e6d8;
      align-self: stretch;
      min-width: 0;
    }
    .post-banniu .panel-head { background: #fff7e6; color: #ad6800; }
    .post-banniu .banniu-panel-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .post-banniu .banniu-edit-actions { display: flex; gap: 6px; }
    .banniu-edit-btn, .banniu-cancel-btn {
      height: 22px;
      padding: 0 10px;
      border-radius: 4px;
      border: 1px solid #ad6800;
      background: #fff;
      color: #ad6800;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      line-height: 1;
    }
    .banniu-edit-btn:hover { background: #fff1d6; }
    .banniu-edit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .post-banniu.editing .banniu-edit-btn { border-color: #237804; color: #237804; background: #f6ffed; }
    .post-banniu.editing .banniu-edit-btn:hover { background: #d9f7be; }
    .banniu-cancel-btn { border-color: #d9d9d9; color: #595959; background: #fff; }
    .banniu-cancel-btn:hover { background: #f5f5f5; }
    .banniu-input {
      width: 100%;
      height: 24px;
      padding: 0 6px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: 12px;
      color: #1f2329;
      background: #fff;
      box-sizing: border-box;
    }
    .post-banniu.editing .banniu-kv[data-editable="1"] .v { padding: 0; }
    .post-banniu .banniu-task-id {
      font-size: 11px;
      color: #8c6d1f;
      word-break: break-all;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px dashed #f0e0c8;
    }
    .post-banniu .banniu-list { display: flex; flex-direction: column; gap: 6px; }
    .post-banniu .banniu-kv { margin: 0; display: flex; align-items: baseline; gap: 8px; }
    .post-banniu .banniu-kv .k { color: #8c6d1f; flex: 0 0 auto; white-space: nowrap; }
    .post-banniu .banniu-kv .v { color: #1f2329; font-weight: 500; flex: 1 1 auto; min-width: 0; word-break: break-word; }
    .post-banniu .banniu-media-label {
      font-size: 11px;
      color: #8c6d1f;
      margin: 10px 0 6px;
      font-weight: 600;
    }
    .post-banniu .banniu-imgs-wrap { overflow-x: auto; margin-top: 4px; }
    .post-banniu .banniu-imgs {
      display: flex;
      gap: 8px;
      min-height: 248px;
    }
    .post-banniu .banniu-thumb-btn {
      border: 0;
      padding: 0;
      background: transparent;
      cursor: zoom-in;
      display: block;
      flex: 0 0 auto;
    }
    .post-banniu .banniu-thumb-btn img {
      width: 330px;
      height: 248px;
      object-fit: cover;
      border-radius: 8px;
      background: #f5f0e6;
      pointer-events: none;
    }
    .post-banniu .banniu-media-empty {
      color: #b0b0b0;
      font-size: 11px;
      padding: 4px 0;
    }

    .left-panel {
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #fafcff;
      border-right: 1px solid #e8eef5;
    }
    .left-panel .panel-head { background: #e6f4ff; color: #0958d9; }
    .post-main { padding: 0; background: transparent; border-bottom: 1px solid #eef2f7; min-width: 0; }
    .post-main .panel-body { padding-top: 10px; }
    .post-main-left { min-width: 0; }
    .post-side {
      display: flex;
      flex-direction: column;
      align-self: stretch;
      background: #f6ffed;
      border-left: 1px solid #d9f7be;
      font-size: 13px;
      line-height: 1.6;
      min-width: 0;
    }
    .post-side .panel-head { background: #f6ffed; color: #237804; border-bottom-color: #d9f7be; }
    .post-side .panel-body-scroll {
      padding: 12px;
      flex: 1;
      overflow-y: auto;
      max-height: 720px;
    }
    .info-line { margin-top: 8px; font-size: 13px; line-height: 1.65; color: #303133; word-break: break-word; }
    .info-line .label { color: #606266; margin-right: 6px; }
    .info-line .value { color: #1f2329; }
    .post-media-row { padding: 10px; border-bottom: 1px solid #f5f5f5; }
    .post-media-row.videos-row { border-bottom: none; }
    .post-media-row:last-child { border-bottom: none; }
    .post-media-row.images-row { background: #f7f8fa; }
    .post-media-row.videos-row { background: #fafbfc; }

    .platform-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-right: 8px; vertical-align: middle; }
    .platform-douyin { background: #fe2c55; color: #fff; }
    .platform-xiaohongshu { background: #ff2442; color: #fff; }
    .platform-bilibili { background: #fb7299; color: #fff; }
    .platform-kuaishou { background: #ff4906; color: #fff; }
    .platform-weibo { background: #e6162d; color: #fff; }
    .platform-dewu { background: #1a1a1a; color: #fff; }
    .platform-xiaoheihe { background: #5ccc8c; color: #fff; }

    .post-head-row { display: flex; align-items: center; flex-wrap: wrap; gap: 8px 12px; margin-bottom: 8px; }
    .media-count-badge {
      font-size: 11px;
      color: #595959;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 999px;
      padding: 2px 8px;
    }
    .final-chip {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #f5f5f5;
      color: #8c8c8c;
    }
    .final-chip.pass { background: #f6ffed; color: #389e0d; border: 1px solid #b7eb8f; }
    .final-chip.reject { background: #fff2f0; color: #cf1322; border: 1px solid #ffccc7; }
    .reviewer-chip {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #fafafa;
      color: #595959;
      border: 1px solid #e8e8e8;
    }
    .section-label { font-size: 11px; color: #8c8c8c; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }

    .title-text { font-size: 14px; font-weight: 600; color: #1d2129; line-height: 1.5; word-break: break-word; }
    .desc-text { font-size: 12px; color: #4b4b4b; line-height: 1.6; margin-top: 4px; word-break: break-word; }

    .author-row { display: flex; align-items: center; gap: 7px; }
    .author-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #1890ff, #69c0ff); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 600; flex-shrink: 0; }
    .author-name { font-size: 12px; font-weight: 500; color: #1d2129; }
    .author-uid { font-size: 10px; color: #8c8c8c; }

    .interact-stats { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
    .interact-stat { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #595959; }
    .interact-stat .val { font-weight: 600; color: #1d2129; }

    .share-url { font-size: 11px; color: #8c8c8c; word-break: break-all; margin-top: 6px; }
    .share-url a { color: #1890ff; text-decoration: none; }

    .post-tags-line .value { display: inline-flex; flex-wrap: wrap; gap: 4px 6px; vertical-align: middle; }
    .tag-chip {
      display: inline-block;
      font-size: 11px;
      line-height: 18px;
      padding: 0 8px;
      color: #1d39c4;
      background: #f0f5ff;
      border: 1px solid #adc6ff;
      border-radius: 999px;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .imgs-wrap { overflow-x: auto; }
    .imgs { display: flex; gap: 8px; min-height: 248px; }
    .thumb-wrap { position: relative; flex: 0 0 auto; }
    .thumb-btn { border: 0; padding: 0; background: transparent; cursor: zoom-in; position: relative; }
    .imgs img, .video-thumb { width: 330px; height: 248px; object-fit: cover; border-radius: 8px; background: #eee; flex: 0 0 auto; pointer-events: none; }
    .video-thumb { display: flex; align-items: flex-end; justify-content: center; padding-bottom: 18px; background: linear-gradient(135deg, #202838, #101722); color: rgba(255,255,255,.82); font-size: 13px; }
    .thumb-btn[data-media-type="video"]::after { content: '▶'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 36px; color: rgba(255,255,255,.85); text-shadow: 0 2px 8px rgba(0,0,0,.4); pointer-events: none; }

    .mark-btn {
      position: absolute; top: 8px; right: 8px;
      width: 30px; height: 30px; border-radius: 999px;
      border: 2px solid rgba(255,255,255,.95);
      background: rgba(0,0,0,.35); color: transparent;
      font-size: 18px; line-height: 24px; font-weight: 700;
      cursor: pointer; z-index: 2;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s ease;
    }
    .mark-btn:hover { background: rgba(0,0,0,.55); }
    .mark-btn.bad { border-color: #ff4d4f; background: #ff4d4f; color: #fff; box-shadow: 0 2px 10px rgba(255,77,79,.45); }
    .mark-btn.good { border-color: #52c41a; background: #52c41a; color: #fff; box-shadow: 0 2px 10px rgba(82,196,26,.45); }

    .post-side .side-label { font-size: 12px; color: #606266; margin: 10px 0 6px; font-weight: 600; }
    .post-side .link { margin-top: 4px; font-size: 12px; color: #666; word-break: break-all; }
    .final-status { font-size: 12px; padding: 6px 10px; border-radius: 6px; background: #f5f5f5; color: #595959; margin-bottom: 4px; }
    .final-status.pass { background: #f6ffed; color: #389e0d; }
    .final-status.reject { background: #fff2f0; color: #cf1322; }
    .final-status.pending { background: #fafafa; color: #8c8c8c; }
    .final-decision-row { display: flex; gap: 8px; margin-top: 4px; }
    .final-btn {
      flex: 1; height: 34px; border: 1px solid #d9d9d9; border-radius: 8px;
      background: #fff; color: #333; font-size: 13px; cursor: pointer;
    }
    .final-btn:hover { background: #f5f5f5; }
    .final-btn.pass.active { border-color: #52c41a; background: #52c41a; color: #fff; }
    .final-btn.reject.active { border-color: #ff4d4f; background: #ff4d4f; color: #fff; }
    .final-suggest-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 4px;
      min-height: 12px;
    }
    .final-suggest {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 12px;
      color: transparent;
      user-select: none;
    }
    .final-suggest .triangle {
      width: 0; height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-bottom: 8px solid currentColor;
      animation: suggestBounce 1.1s ease-in-out infinite;
    }
    .final-suggest .check-mark {
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
    }
    .final-suggest.show.pass { color: #52c41a; }
    .final-suggest.show.reject { color: #ff4d4f; }
    .final-suggest.matched { opacity: 0.55; }
    .final-suggest.matched .triangle { animation: none; }
    @keyframes suggestBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .review-reason {
      width: 100%; min-height: 72px; margin-top: 4px; padding: 8px 10px;
      border: 1px solid #d9d9d9; border-radius: 8px; font-size: 12px; line-height: 1.5;
      resize: vertical; font-family: inherit; color: #1d2129;
    }
    .review-reason.invalid { border-color: #ff4d4f; background: #fff1f0; box-shadow: 0 0 0 2px rgba(255, 77, 79, 0.12); }
    .reason-required-mark { color: #ff4d4f; font-weight: 600; font-size: 11px; margin-left: 6px; display: none; }
    .row[data-final-approved="false"] .reason-required-mark { display: inline; }
    .final-required-mark { color: #ff4d4f; font-weight: 600; font-size: 11px; margin-left: 6px; display: none; }
    .row:not([data-final-approved="true"]):not([data-final-approved="false"]) .final-required-mark { display: inline; }
    .final-decision-row.invalid .final-btn { border-color: #ff4d4f; background: #fff1f0; box-shadow: 0 0 0 2px rgba(255, 77, 79, 0.12); }
    .review-panel {
      margin-top: 10px; border: 1px solid #eee; border-radius: 8px; background: #fafafa;
      font-size: 12px; line-height: 1.55; color: #303133;
    }
    .review-panel summary { cursor: pointer; padding: 8px 10px; font-weight: 600; color: #1d2129; list-style: none; }
    .review-panel summary::-webkit-details-marker { display: none; }
    .review-panel .review-panel-body { padding: 0 10px 10px; border-top: 1px solid #eee; }
    .review-block { margin-top: 8px; }
    .review-block-title { font-weight: 600; color: #606266; margin-bottom: 4px; }
    .review-kv { margin: 2px 0; word-break: break-word; }
    .review-kv .k { color: #909399; margin-right: 4px; }
    .review-raw-json {
      margin: 8px 0 0;
      padding: 8px 10px;
      background: #f6f8fa;
      border: 1px solid #eaecef;
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "PingFang SC", monospace;
      font-size: 12px;
      line-height: 1.5;
      color: #24292e;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 360px;
      overflow: auto;
    }
    .save-media-btn {
      margin-top: 12px; width: 100%; height: 36px; border: 0; border-radius: 8px;
      background: #1677ff; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .save-media-btn:hover { background: #0958d9; }
    .save-media-btn:disabled { background: #8fb8ff; cursor: not-allowed; }

    .auto-check {
      margin-top: 4px;
      border: 1px solid #e6e6e6;
      border-radius: 8px;
      background: #fafafa;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.5;
    }
    .auto-check-head {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .auto-check-label { font-weight: 600; color: #606266; }
    .auto-check-result {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      font-size: 12px; font-weight: 600;
      background: #f0f0f0; color: #595959;
    }
    .auto-check-result.pass { background: #f6ffed; color: #389e0d; border: 1px solid #b7eb8f; }
    .auto-check-result.reject { background: #fff2f0; color: #cf1322; border: 1px solid #ffccc7; }
    .auto-check-result.pending { background: #f0f5ff; color: #2f54eb; border: 1px solid #adc6ff; }
    .auto-check-result.error { background: #fffbe6; color: #ad6800; border: 1px solid #ffe58f; }
    .auto-check-msgs {
      margin: 6px 0 0; padding-left: 18px; color: #555;
    }
    .auto-check-msgs:empty { display: none; }
    .auto-check-msgs li { margin: 2px 0; }
    .auto-check-empty { color: #8c8c8c; margin-top: 6px; }
    .auto-check.pass-banner { background: #f6ffed; border-color: #b7eb8f; }
    .auto-check.reject-banner { background: #fff2f0; border-color: #ffccc7; }

    .back-top { position: fixed; right: 70px; bottom: 70px; width: 92px; height: 92px; border: 0; border-radius: 999px; background: rgba(17,23,34,.85); color: #fff; font-size: 40px; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 999; box-shadow: 0 4px 14px rgba(0,0,0,.25); }
    .back-top.show { display: flex; }
    .back-top:hover { background: rgba(17,23,34,.96); }

    .empty-state { background: #fff; border-radius: 12px; padding: 50px; text-align: center; color: #8c8c8c; }
    .empty-state .icon { font-size: 42px; margin-bottom: 12px; }
    .empty-state .text { font-size: 14px; }

    @media (max-width: 1200px) {
      .row { grid-template-columns: 1fr; }
      .post-banniu,
      .left-panel,
      .post-side {
        border-right: none;
        border-left: none;
        border-bottom: 1px solid #eee;
      }
      .post-side .panel-body-scroll { max-height: none; }
    }

    /* Viewer */
    .viewer-mask { position: fixed; inset: 0; background: rgba(0,0,0,.82); display: none; align-items: center; justify-content: center; z-index: 9999; }
    .viewer-mask.show { display: flex; }
    .viewer-content { position: relative; width: min(95vw, 1800px); height: min(94vh, 1080px); display: grid; grid-template-columns: 1fr 360px; gap: 14px; background: #111722; border-radius: 14px; padding: 14px; box-shadow: 0 12px 40px rgba(0,0,0,.45); }
    .viewer-main { position: relative; overflow: hidden; background: #0b0f17; border-radius: 10px; cursor: grab; }
    .viewer-main.dragging { cursor: grabbing; }
    .viewer-stage { position: absolute; inset: 0; overflow: hidden; padding: 10px 10px 24px 10px; box-sizing: border-box; }
    .viewer-img { position: absolute; left: 0; top: 0; user-select: none; -webkit-user-drag: none; transform-origin: 0 0; border-radius: 8px; }
    .viewer-video { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); max-width: 92%; max-height: 84%; object-fit: contain; background: #0b0f17; display: none; border-radius: 8px; }
    .viewer-meta { background: #1a2130; border-radius: 10px; padding: 12px; color: #e8edf7; font-size: 13px; line-height: 1.65; overflow-y: auto; }
    .viewer-meta b { color: #fff; }
    .viewer-meta .viewer-title { margin-top: 8px; word-break: break-word; }
    .viewer-meta .viewer-link { margin-top: 10px; font-size: 12px; word-break: break-all; }
    .viewer-meta .viewer-link a { color: #8cb4ff; text-decoration: none; }
    .viewer-meta .meta-item { margin-bottom: 6px; }
    .viewer-meta .viewer-mark { margin-top: 10px; width: 100%; height: 34px; border-radius: 7px; border: 1px solid #44506b; background: #28334a; color: #e9eef8; cursor: pointer; font-size: 13px; font-weight: 600; }
    .viewer-meta .viewer-mark:hover { background: #34455e; }
    .viewer-meta .viewer-mark.bad { border-color: #ff4d4f; background: #ff4d4f; color: #fff; }
    .viewer-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 50px; height: 50px; border-radius: 999px; border: 0; background: rgba(255,255,255,.2); color: #fff; font-size: 28px; cursor: pointer; z-index: 20; }
    .viewer-btn:hover { background: rgba(255,255,255,.35); }
    .viewer-prev { left: 10px; }
    .viewer-next { right: 10px; }
    .viewer-close { position: absolute; top: 10px; right: 10px; width: 36px; height: 36px; border: 0; border-radius: 999px; background: rgba(0,0,0,.55); color: #fff; font-size: 22px; line-height: 1; cursor: pointer; z-index: 30; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,.35); }
    .viewer-close:hover { background: rgba(0,0,0,.75); }
    .viewer-index { position: absolute; left: 50%; bottom: 8px; transform: translateX(-50%); color: #dce3f3; font-size: 13px; z-index: 20; }
    .viewer-good-badge { position: absolute; top: 24px; right: 24px; width: 68px; height: 68px; border-radius: 999px; border: 4px solid #52c41a; background: #52c41a; color: #fff; font-size: 40px; font-weight: 800; line-height: 1; display: none; align-items: center; justify-content: center; box-shadow: 0 2px 10px rgba(82,196,26,.45); z-index: 25; pointer-events: none; }
    .viewer-good-badge.show { display: flex; }
    .viewer-bad-badge { position: absolute; top: 24px; right: 24px; width: 68px; height: 68px; border-radius: 999px; border: 4px solid #ff4d4f; background: #ff4d4f; color: #fff; font-size: 40px; font-weight: 800; line-height: 1; display: none; align-items: center; justify-content: center; box-shadow: 0 2px 10px rgba(255,77,79,.45); z-index: 25; pointer-events: none; }
    .viewer-bad-badge.show { display: flex; }

    /* 班牛截图：仅大图预览，无侧栏/翻页/标注（窗口约为初版 1.5 倍） */
    .viewer-content.viewer-simple {
      width: min(98vw, 1800px);
      height: min(96vh, 1350px);
      grid-template-columns: 1fr;
      gap: 0;
      padding: 12px;
    }
    .viewer-content.viewer-simple .viewer-meta,
    .viewer-content.viewer-simple .viewer-btn,
    .viewer-content.viewer-simple .viewer-index,
    .viewer-content.viewer-simple .viewer-good-badge,
    .viewer-content.viewer-simple .viewer-bad-badge {
      display: none !important;
    }
    .viewer-content.viewer-simple .viewer-main { border-radius: 10px; }
    .viewer-content.viewer-simple .viewer-stage { padding: 8px; }
  </style>
</head>
<body>
{% from '_macros.html' import image_stream_url, video_stream_url %}

<div class="wrap">
  <div class="header">
    <h1>搬牛 - 帖子综合审核</h1>
    <p>标注图片/视频后可保存归档；可同时选择审核通过/不通过并填写备注</p>
  </div>

  {% if has_data %}
  <div class="filter-bar" id="filterBar">
    <div class="filter-title">筛选与搜索</div>
    <div class="filter-group keyword">
      <label for="searchKeyword">关键词</label>
      <input type="search" id="searchKeyword" placeholder="task_id、标题、正文、作者、分享链接…" autocomplete="off" />
    </div>
    <div class="filter-group">
      <label for="filterProductModel">产品型号</label>
      <select id="filterProductModel">
        <option value="">全部</option>
        {% for v in product_models %}
        <option value="{{ v }}">{{ v }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="filter-group range">
      <label for="filterCreatedStart">创建时间起</label>
      <input type="datetime-local" id="filterCreatedStart" />
    </div>
    <div class="filter-group range">
      <label for="filterCreatedEnd">创建时间止</label>
      <input type="datetime-local" id="filterCreatedEnd" />
    </div>
    <div class="filter-group">
      <label for="filterReviewStatus">审核状态</label>
      <select id="filterReviewStatus">
        <option value="">全部</option>
        {% for v in review_statuses %}
        <option value="{{ v }}">{{ v }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="filter-group">
      <label for="filterTaskStatus">任务状态</label>
      <select id="filterTaskStatus">
        <option value="">全部</option>
        {% for v in task_statuses %}
        <option value="{{ v }}">{{ v }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="filter-group">
      <label for="filterFinalApproved">终审（post_review_final）</label>
      <select id="filterFinalApproved">
        <option value="">全部</option>
        <option value="true">已通过</option>
        <option value="false">已驳回</option>
        <option value="none" selected>未决策</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="filterReviewer">审核员</label>
      <select id="filterReviewer">
        <option value="">全部</option>
        {% for v in reviewers %}
        <option value="{{ v }}">{{ v }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="filter-actions">
      <button type="button" class="filter-btn primary" id="filterSearchBtn">搜索</button>
      <button type="button" class="filter-btn" id="filterResetBtn">重置</button>
    </div>
    <div class="filter-summary" id="searchSummary"></div>
  </div>

  <div class="search-empty-hint" id="searchEmptyHint">没有匹配的帖子，请调整搜索或筛选条件</div>

  <div class="rows" id="rowsContainer"></div>
  <div id="paginateLoading">加载中…</div>
  <div id="paginateSentinel" aria-hidden="true"></div>
  {% else %}
  <div class="empty-state">
    <div class="icon">📭</div>
    <div class="text">当前目录没有可审核的帖子数据</div>
  </div>
  {% endif %}

  {# 单行渲染已迁移到 _row.html，由 /api/next-rows 动态获取 #}
</div>

<button id="backTopBtn" class="back-top" type="button">↑</button>

<div id="viewerMask" class="viewer-mask" aria-hidden="true">
  <div class="viewer-content">
    <button id="viewerClose" class="viewer-close" type="button" aria-label="close">×</button>
    <main class="viewer-main">
      <button id="viewerPrev" class="viewer-btn viewer-prev" type="button" aria-label="prev">‹</button>
      <div id="viewerGoodBadge" class="viewer-good-badge">✓</div>
      <div id="viewerBadBadge" class="viewer-bad-badge">✕</div>
      <div id="viewerStage" class="viewer-stage">
        <img id="viewerImg" class="viewer-img" src="" alt="preview" />
        <video id="viewerVideo" class="viewer-video" controls preload="metadata" playsinline muted></video>
      </div>
      <button id="viewerNext" class="viewer-btn viewer-next" type="button" aria-label="next">›</button>
      <div id="viewerIndex" class="viewer-index"></div>
    </main>
    <aside class="viewer-meta">
      <div class="meta-item"><b>平台：</b><span id="vPlatform"></span></div>
      <div class="meta-item"><b>task_id：</b><span id="vTaskId"></span></div>
      <div class="meta-item"><b>媒体：</b><span id="vPos"></span></div>
      <div class="viewer-title"><b>标题：</b><span id="vTitle"></span></div>
      <div class="viewer-link"><b>分享链接：</b><a id="vShareUrl" href="#" target="_blank" rel="noopener noreferrer"></a></div>
      <button id="viewerMarkBtn" class="viewer-mark" type="button">标记为不符合</button>
    </aside>
  </div>
</div>

<script>
(() => {
  const mask = document.getElementById('viewerMask');
  const vImg = document.getElementById('viewerImg');
  const vVideo = document.getElementById('viewerVideo');
  vVideo.addEventListener('error', e => { console.error('Video error event:', vVideo.error, 'src:', vVideo.src); });
  vVideo.addEventListener('stalled', () => { console.warn('Video stalled, src:', vVideo.src); });
  const viewerStage = document.getElementById('viewerStage');
  const viewerMain = document.querySelector('.viewer-main');
  const vPlatform = document.getElementById('vPlatform');
  const vTaskId = document.getElementById('vTaskId');
  const vPos = document.getElementById('vPos');
  const vTitle = document.getElementById('vTitle');
  const vShareUrl = document.getElementById('vShareUrl');
  const vIndex = document.getElementById('viewerIndex');
  const vBadBadge = document.getElementById('viewerBadBadge');
  const vGoodBadge = document.getElementById('viewerGoodBadge');
  const btnPrev = document.getElementById('viewerPrev');
  const btnNext = document.getElementById('viewerNext');
  const btnClose = document.getElementById('viewerClose');
  const backTopBtn = document.getElementById('backTopBtn');
  const vMarkBtn = document.getElementById('viewerMarkBtn');
  const viewerContent = document.querySelector('.viewer-content');

  const MARK_STORE_KEY = 'gallery_marks_' + window.location.pathname;
  const badSet = new Set();
  const goodSet = new Set();
  let flatList = [];
  let currentIdx = 0;
  let scale = 1;
  let tx = 0, ty = 0;
  let fitScale = 1;
  let dragging = false;
  let dragStartX = 0, dragStartY = 0, dragBaseX = 0, dragBaseY = 0;
  let currentMediaType = 'image';
  let viewerSimpleMode = false;

  function setViewerSimpleMode(simple) {
    viewerSimpleMode = !!simple;
    if (viewerContent) viewerContent.classList.toggle('viewer-simple', viewerSimpleMode);
    if (!viewerSimpleMode) resetViewerImgLayout();
  }

  function resetViewerImgLayout() {
    vImg.style.width = '';
    vImg.style.height = '';
    vImg.style.maxWidth = '';
    vImg.style.maxHeight = '';
    vImg.style.objectFit = '';
    vImg.style.transform = '';
    scale = 1;
    tx = 0;
    ty = 0;
  }

  function fitBanniuImageToViewer() {
    fitImageToViewer({ allowUpscale: true });
  }

  function saveMarks() {
    try { localStorage.setItem(MARK_STORE_KEY, JSON.stringify({ bad: Array.from(badSet), good: Array.from(goodSet) })); } catch (_) {}
  }

  function loadMarks() {
    try {
      const raw = localStorage.getItem(MARK_STORE_KEY);
      if (!raw) return;
      const parsed = JSON.parse(raw);
      (parsed?.bad || []).forEach(k => badSet.add(String(k)));
      (parsed?.good || []).forEach(k => goodSet.add(String(k)));
      goodSet.forEach(k => badSet.delete(k));
    } catch (_) {}
  }

  function applyTransform() {
    vImg.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
  }

  function fitImageToViewer(opts = {}) {
    resetViewerImgLayout();
    const vw = viewerStage.clientWidth;
    const vh = viewerStage.clientHeight;
    const iw = vImg.naturalWidth || 0;
    const ih = vImg.naturalHeight || 0;
    if (!vw || !vh || !iw || !ih) return;
    vImg.style.width = `${iw}px`;
    vImg.style.height = `${ih}px`;
    const baseFit = Math.min(vw / iw, vh / ih);
    fitScale = opts.allowUpscale ? baseFit : Math.min(baseFit, 1);
    scale = fitScale;
    tx = (vw - iw * scale) / 2;
    ty = (vh - ih * scale) / 2;
    viewerMain.classList.remove('dragging');
    applyTransform();
  }

  function syncMarks() {
    document.querySelectorAll('.mark-btn').forEach(btn => {
      const key = btn.dataset.markKey || '';
      const isBad = badSet.has(key);
      const isGood = goodSet.has(key);
      btn.classList.toggle('bad', isBad);
      btn.classList.toggle('good', isGood);
      btn.textContent = isBad ? '✕' : (isGood ? '✓' : '×');
      btn.title = isBad ? '已标记不符合（点击取消）' : (isGood ? '已标记符合' : '标记为不符合');
    });
    const key = flatList[currentIdx]?.markKey || '';
    const isBad = badSet.has(key);
    const isGood = goodSet.has(key);
    vMarkBtn.classList.toggle('bad', isBad);
    vMarkBtn.textContent = isBad ? '已标记不符合（点击取消）' : '标记为不符合';
    vBadBadge.classList.toggle('show', isBad);
    vGoodBadge.classList.toggle('show', isGood);
  }

  const checkTimers = new WeakMap();
  const checkAbortControllers = new WeakMap();
  const checkedRows = new WeakSet();

  // 后端所有 /api/* 路由都套了 common_route_wrap，返回体形如：
  //   { status_code: 60200, result: {...}, message: 'success', detail: null, time_cost: <s> }
  //   或异常时 { status_code: <非 60200>, result: null, message: '...错误说明...', detail, traceback, time_cost }
  // 因此前端统一用这个 helper 走："业务码 60200 → 拿 result；否则 throw message"。
  // 即便后端意外返回了非 JSON（极少数被反代/网关拦截的场景），也兜底成可读错误。
  async function callApi(url, body, { signal } = {}) {
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body || {}),
      signal,
    });
    const raw = await resp.text();
    let data = null;
    try { data = raw ? JSON.parse(raw) : null; } catch (_) { /* 保留 raw，由下方报错 */ }
    if (!data || typeof data !== 'object' || typeof data.status_code === 'undefined') {
      throw new Error(`HTTP ${resp.status}：${raw || resp.statusText || '无响应内容'}`);
    }
    if (data.status_code !== 60200) {
      // 业务错误：直接抛 message，前端 alert 显示就够了。
      throw new Error(data.message || `HTTP ${resp.status}：未知错误`);
    }
    return data.result;
  }

  function findRowByMarkKey(markKey) {
    if (!markKey) return null;
    const item = flatList.find(x => x.markKey === markKey);
    if (!item || !item.rowSource) return null;
    return document.querySelector(`#rowsContainer .row[data-source-file="${CSS.escape(item.rowSource)}"]`);
  }

  function clearFinalSuggest(rowEl) {
    if (!rowEl) return;
    rowEl.querySelectorAll('[data-final-suggest-slot]').forEach((slot) => {
      slot.classList.remove('show', 'pass', 'reject', 'matched');
      slot.innerHTML = '';
      slot.removeAttribute('title');
    });
    delete rowEl.dataset.autoCheckSuggest;
  }

  function applyFinalSuggest(rowEl, approval) {
    if (!rowEl) return;
    const passSlot = rowEl.querySelector('[data-final-suggest-slot="true"]');
    const rejectSlot = rowEl.querySelector('[data-final-suggest-slot="false"]');
    [passSlot, rejectSlot].forEach((slot) => {
      if (!slot) return;
      slot.classList.remove('show', 'pass', 'reject', 'matched');
      slot.innerHTML = '';
      slot.removeAttribute('title');
    });
    const target = approval ? passSlot : rejectSlot;
    if (!target) return;
    target.classList.add('show', approval ? 'pass' : 'reject');
    target.innerHTML = '<span class="triangle"></span>';
    target.title = '自动审核建议点这里';
    rowEl.dataset.autoCheckSuggest = approval ? 'true' : 'false';
    syncFinalSuggestMatched(rowEl);
  }

  function syncFinalSuggestMatched(rowEl) {
    if (!rowEl) return;
    const suggest = rowEl.dataset.autoCheckSuggest || '';
    if (!suggest) return;
    const picked = rowEl.dataset.finalApproved || '';
    rowEl.querySelectorAll('[data-final-suggest-slot]').forEach((slot) => {
      const slotVal = slot.dataset.finalSuggestSlot || '';
      if (slotVal !== suggest) return;
      const matched = picked === suggest;
      slot.classList.toggle('matched', matched);
      slot.innerHTML = matched
        ? '<span class="check-mark">✓</span>'
        : '<span class="triangle"></span>';
      slot.title = matched ? '已采纳自动审核建议' : '自动审核建议点这里';
    });
  }

  function renderAutoCheck(rowEl, state) {
    if (!rowEl) return;
    const wrap = rowEl.querySelector('[data-auto-check]');
    const result = rowEl.querySelector('[data-auto-check-result]');
    const msgs = rowEl.querySelector('[data-auto-check-msgs]');
    const empty = rowEl.querySelector('[data-auto-check-empty]');
    if (!wrap || !result || !msgs || !empty) return;

    wrap.classList.remove('pass-banner', 'reject-banner');
    result.classList.remove('pass', 'reject', 'pending', 'error');
    msgs.innerHTML = '';
    empty.style.display = 'none';

    if (state.status === 'loading') {
      result.classList.add('pending');
      result.textContent = '检查中…';
      return;
    }
    if (state.status === 'error') {
      result.classList.add('error');
      result.textContent = '检查失败';
      const li = document.createElement('li');
      li.textContent = state.message || '未知错误';
      msgs.appendChild(li);
      clearFinalSuggest(rowEl);
      return;
    }
    if (state.status === 'skipped') {
      result.classList.add('pending');
      result.textContent = '已跳过';
      const li = document.createElement('li');
      li.textContent = state.message || '前置信息缺失，跳过自动预测';
      msgs.appendChild(li);
      clearFinalSuggest(rowEl);
      return;
    }

    const approval = !!state.approval;
    const reasons = state.review_msg || {};
    const entries = Object.entries(reasons);

    if (approval) {
      wrap.classList.add('pass-banner');
      result.classList.add('pass');
      result.textContent = '将通过';
    } else {
      wrap.classList.add('reject-banner');
      result.classList.add('reject');
      result.textContent = '将不通过';
    }
    if (entries.length === 0) {
      empty.style.display = approval ? 'block' : 'none';
    } else {
      entries.forEach(([k, v]) => {
        const li = document.createElement('li');
        li.textContent = String(v);
        li.dataset.checkKey = k;
        msgs.appendChild(li);
      });
    }
    applyFinalSuggest(rowEl, approval);
  }

  async function runAutoCheck(rowEl) {
    if (!rowEl) return;
    const sourceFile = rowEl.dataset.sourceFile || '';
    if (!sourceFile) return;
    if (rowEl.dataset.hasPost !== '1' || rowEl.dataset.hasReview !== '1') {
      const missing = [];
      if (rowEl.dataset.hasPost !== '1') missing.push('贴子信息');
      if (rowEl.dataset.hasReview !== '1') missing.push('审核信息');
      renderAutoCheck(rowEl, { status: 'skipped', message: `缺少${missing.join('与')}，跳过自动预测` });
      checkedRows.add(rowEl);
      return;
    }

    const prevCtrl = checkAbortControllers.get(rowEl);
    if (prevCtrl) { try { prevCtrl.abort(); } catch (_) {} }
    const ctrl = new AbortController();
    checkAbortControllers.set(rowEl, ctrl);

    renderAutoCheck(rowEl, { status: 'loading' });

    const body = {
      source_file: sourceFile,
      media_marks: collectMediaMarks(rowEl),
    };

    try {
      const result = await callApi('/api/post-review-check', body, { signal: ctrl.signal });
      checkedRows.add(rowEl);
      renderAutoCheck(rowEl, {
        status: 'ok',
        approval: !!result?.approval,
        review_msg: result?.review_msg || {},
      });
    } catch (err) {
      if (err && err.name === 'AbortError') return;
      renderAutoCheck(rowEl, { status: 'error', message: err?.message || String(err) });
    }
  }

  function scheduleAutoCheck(rowEl, delay = 350) {
    if (!rowEl) return;
    const prev = checkTimers.get(rowEl);
    if (prev) clearTimeout(prev);
    const t = setTimeout(() => {
      checkTimers.delete(rowEl);
      runAutoCheck(rowEl);
    }, delay);
    checkTimers.set(rowEl, t);
  }

  function ensureAutoCheckedOnce(rowEl) {
    if (!rowEl || checkedRows.has(rowEl)) return;
    checkedRows.add(rowEl);
    scheduleAutoCheck(rowEl, 50);
  }

  function openBanniuViewer(src) {
    const url = String(src || '').trim();
    if (!url) return;
    setViewerSimpleMode(true);
    currentMediaType = 'image';
    vVideo.pause();
    vVideo.removeAttribute('src');
    vVideo.load();
    vVideo.style.display = 'none';
    vImg.style.display = 'block';
    mask.classList.add('show');
    mask.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
    const tryFit = (retry = 6) => {
      const vw = viewerStage.clientWidth;
      const vh = viewerStage.clientHeight;
      const iw = vImg.naturalWidth || 0;
      const ih = vImg.naturalHeight || 0;
      if (vw && vh && iw && ih) {
        fitBanniuImageToViewer();
      } else if (retry > 0) {
        requestAnimationFrame(() => tryFit(retry - 1));
      }
    };
    vImg.onload = () => requestAnimationFrame(() => tryFit());
    vImg.src = url;
    if (vImg.complete && vImg.naturalWidth > 0) {
      requestAnimationFrame(() => tryFit());
    }
  }

  function renderViewer() {
    const item = flatList[currentIdx];
    if (!item) return;
    setViewerSimpleMode(false);
    currentMediaType = item.mediaType || 'image';
    if (currentMediaType === 'video') {
      vImg.style.display = 'none';
      vVideo.style.display = 'block';
      if (vVideo.src !== item.src) {
        vVideo.pause();
        vVideo.removeAttribute('src');
        vVideo.load();
        vVideo.src = item.src;
      }
      vVideo.load();
      vVideo.currentTime = 0;
      vVideo.play().catch(err => { console.warn('Video play failed:', err.message, 'src:', vVideo.src); });
    } else {
      vVideo.pause();
      vVideo.removeAttribute('src');
      vVideo.load();
      vVideo.style.display = 'none';
      vImg.style.display = 'block';
      vImg.src = item.src;
      if (vImg.complete && vImg.naturalWidth > 0) fitImageToViewer();
      else vImg.onload = () => fitImageToViewer();
    }
    vPlatform.textContent = item.platform || '';
    vTaskId.textContent = item.taskId || '';
    vPos.textContent = `${currentIdx + 1} / ${flatList.length}`;
    vTitle.textContent = item.title || '';
    vShareUrl.textContent = item.shareUrl || '-';
    vShareUrl.href = item.shareUrl || '#';
    vIndex.textContent = `${currentIdx + 1} / ${flatList.length}（方向键切换，Space 视频暂停/图片下一张，Enter 符合，Backspace 不符合，Esc 关闭）`;
    syncMarks();
  }

  function openViewer(startIdx) {
    currentIdx = Math.max(0, Math.min(startIdx || 0, flatList.length - 1));
    if (!flatList.length) return;
    mask.classList.add('show');
    mask.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
    requestAnimationFrame(() => renderViewer());
  }

  function closeViewer() {
    vVideo.pause();
    vVideo.removeAttribute('src');
    vVideo.load();
    mask.classList.remove('show');
    mask.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
    dragging = false;
    setViewerSimpleMode(false);
  }

  function prev() { if (flatList.length) { currentIdx = (currentIdx - 1 + flatList.length) % flatList.length; renderViewer(); } }
  function next() { if (flatList.length) { currentIdx = (currentIdx + 1) % flatList.length; renderViewer(); } }

  function buildFlatList() {
    flatList = [];
    document.querySelectorAll('#rowsContainer .row .thumb-btn').forEach(item => {
      const mediaType = item.dataset.mediaType || 'image';
      const src = item.dataset.viewerSrc || '';
      const shareUrl = item.dataset.shareUrl || '';
      const rowEl = item.closest('.row');
      if (!src) return;
      flatList.push({
        src,
        mediaType,
        platform: item.dataset.platform || '',
        taskId: rowEl?.dataset.taskId || '',
        title: item.dataset.title || '',
        shareUrl,
        markKey: item.dataset.markKey || '',
        rowSource: rowEl?.dataset.sourceFile || '',
      });
    });
  }

  vMarkBtn.addEventListener('click', () => {
    const key = flatList[currentIdx]?.markKey || '';
    if (!key) return;
    if (badSet.has(key)) badSet.delete(key);
    else { badSet.add(key); goodSet.delete(key); }
    saveMarks();
    syncMarks();
    scheduleAutoCheck(findRowByMarkKey(key));
  });

  btnPrev.addEventListener('click', prev);
  btnNext.addEventListener('click', next);
  btnClose.addEventListener('click', closeViewer);
  mask.addEventListener('click', (e) => { if (e.target === mask) closeViewer(); });

  document.addEventListener('keydown', (e) => {
    if (!mask.classList.contains('show')) return;
    if (e.key === 'Escape') {
      closeViewer();
      return;
    }
    if (viewerSimpleMode) return;
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prev();
    else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next();
    else if (e.code === 'Space') {
      e.preventDefault();
      if (currentMediaType === 'video') { if (vVideo.paused) vVideo.play().catch(() => {}); else vVideo.pause(); }
      else { next(); }
    } else if (e.key === 'Enter') {
      e.preventDefault();
      const key = flatList[currentIdx]?.markKey || '';
      if (!key) return;
      if (goodSet.has(key)) goodSet.delete(key);
      else { goodSet.add(key); badSet.delete(key); }
      saveMarks();
      syncMarks();
      scheduleAutoCheck(findRowByMarkKey(key));
    } else if (e.key === 'Backspace') {
      e.preventDefault();
      const key = flatList[currentIdx]?.markKey || '';
      if (!key) return;
      if (badSet.has(key)) badSet.delete(key);
      else { badSet.add(key); goodSet.delete(key); }
      saveMarks();
      syncMarks();
      scheduleAutoCheck(findRowByMarkKey(key));
    }
  });

  viewerMain.addEventListener('wheel', (e) => {
    if (!mask.classList.contains('show') || currentMediaType !== 'image') return;
    e.preventDefault();
    const oldScale = scale || 1;
    const factor = e.deltaY > 0 ? 0.92 : 1.08;
    const nextScale = Math.max(fitScale * 0.3, Math.min(6, scale * factor));
    const newScale = Number(nextScale.toFixed(4));
    const rect = vImg.getBoundingClientRect();
    const ratio = newScale / oldScale;
    tx += (e.clientX - rect.left) * (1 - ratio);
    ty += (e.clientY - rect.top) * (1 - ratio);
    scale = newScale;
    applyTransform();
  }, { passive: false });

  vImg.addEventListener('mousedown', (e) => {
    if (!mask.classList.contains('show') || currentMediaType !== 'image') return;
    dragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    dragBaseX = tx;
    dragBaseY = ty;
    viewerMain.classList.add('dragging');
    e.preventDefault();
  });

  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    tx = dragBaseX + (e.clientX - dragStartX);
    ty = dragBaseY + (e.clientY - dragStartY);
    applyTransform();
  });

  window.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    viewerMain.classList.remove('dragging');
  });

  window.addEventListener('resize', () => {
    if (!mask.classList.contains('show')) return;
    if (viewerSimpleMode) fitBanniuImageToViewer();
    else fitImageToViewer();
  });

  backTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  window.addEventListener('scroll', () => { const y = window.scrollY || document.documentElement.scrollTop || 0; backTopBtn.classList.toggle('show', y > 280); }, { passive: true });

  const searchKeyword = document.getElementById('searchKeyword');
  const searchSummary = document.getElementById('searchSummary');
  const searchEmptyHint = document.getElementById('searchEmptyHint');
  const filterSearchBtn = document.getElementById('filterSearchBtn');
  const filterProductModel = document.getElementById('filterProductModel');
  const filterCreatedStart = document.getElementById('filterCreatedStart');
  const filterCreatedEnd = document.getElementById('filterCreatedEnd');
  const filterReviewStatus = document.getElementById('filterReviewStatus');
  const filterTaskStatus = document.getElementById('filterTaskStatus');
  const filterFinalApproved = document.getElementById('filterFinalApproved');
  const filterReviewer = document.getElementById('filterReviewer');
  const filterResetBtn = document.getElementById('filterResetBtn');

  // 把筛选条件缓存到 sessionStorage：刷新页面后自动还原，关闭标签页则自然清空。
  // bump key 后缀（v1 → v2 → ...）即可在筛选结构升级时丢弃旧值。
  // v3: 创建时间 input 重新回到 datetime-local，旧 v2 的 "yyyy-MM-dd" 不再兼容。
  // v4: 新增 reviewer 字段。
  const FILTERS_STORAGE_KEY = 'post_review_submit_filters_v4';

  function saveFiltersToStorage() {
    try {
      const data = {
        keyword: searchKeyword?.value || '',
        product_model: filterProductModel?.value || '',
        created_start: filterCreatedStart?.value || '',
        created_end: filterCreatedEnd?.value || '',
        review_status: filterReviewStatus?.value || '',
        task_status: filterTaskStatus?.value || '',
        final_approved: filterFinalApproved?.value || '',
        reviewer: filterReviewer?.value || '',
      };
      sessionStorage.setItem(FILTERS_STORAGE_KEY, JSON.stringify(data));
    } catch (err) {
      // sessionStorage 可能被禁用或配额耗尽，忽略即可。
    }
  }

  function restoreFiltersFromStorage() {
    let data = null;
    try {
      const raw = sessionStorage.getItem(FILTERS_STORAGE_KEY);
      if (!raw) return;
      data = JSON.parse(raw);
    } catch (err) {
      return;
    }
    if (!data || typeof data !== 'object') return;
    if (searchKeyword && typeof data.keyword === 'string') searchKeyword.value = data.keyword;
    if (filterProductModel && typeof data.product_model === 'string') filterProductModel.value = data.product_model;
    if (filterCreatedStart && typeof data.created_start === 'string') filterCreatedStart.value = data.created_start;
    if (filterCreatedEnd && typeof data.created_end === 'string') filterCreatedEnd.value = data.created_end;
    if (filterReviewStatus && typeof data.review_status === 'string') filterReviewStatus.value = data.review_status;
    if (filterTaskStatus && typeof data.task_status === 'string') filterTaskStatus.value = data.task_status;
    if (filterFinalApproved && typeof data.final_approved === 'string') filterFinalApproved.value = data.final_approved;
    if (filterReviewer && typeof data.reviewer === 'string') filterReviewer.value = data.reviewer;
  }

  // 按天筛选友好：用户在 datetime-local 上选完日期那一刻，把时分自动设为 defaultTime
  // （起点 00:00、终点 23:59，闭区间刚好覆盖整天）。
  // 用户后续手动改过时分后，就不再被自动覆盖——保留精细到分钟的选择能力。
  function setupDateAutoTime(input, defaultTime) {
    if (!input) return;
    let lastValue = input.value || '';
    input.addEventListener('input', () => {
      const newValue = input.value || '';
      if (!newValue) {
        lastValue = '';
        return;
      }
      const [newDate, newTime = ''] = newValue.split('T');
      const [oldDate] = lastValue.split('T');
      // 只在「日期变了 + 当前时分不是默认值」时才覆盖：
      // - 首次选日期时 oldDate='', 命中覆盖；
      // - 改日期时 oldDate != newDate, 命中覆盖；
      // - 仅改时分时 oldDate == newDate, 不覆盖。
      if (newDate !== oldDate && newTime !== defaultTime) {
        input.value = `${newDate}T${defaultTime}`;
      }
      lastValue = input.value;
    });
  }

  function parseCreatedAt(s) {
    const raw = String(s || '').trim();
    if (!raw) return null;
    const normalized = raw.includes('T') ? raw : raw.replace(' ', 'T');
    const t = Date.parse(normalized);
    return Number.isNaN(t) ? null : t;
  }

  function parseDatetimeLocalInput(v) {
    const raw = String(v || '').trim();
    if (!raw) return null;
    const t = Date.parse(raw);
    return Number.isNaN(t) ? null : t;
  }

  function syncViewerAfterFilter() {
    buildFlatList();
    if (!mask.classList.contains('show')) return;
    const cur = flatList[currentIdx];
    if (!cur || !flatList.length) closeViewer();
    else {
      const idx = flatList.findIndex((x) => x.markKey === cur.markKey);
      if (idx < 0) closeViewer();
      else if (idx !== currentIdx) openViewer(idx);
    }
  }

  const PAGE_SIZE = 2;
  // 前端持久化 ID：只在首次访问该浏览器时生成，存入 localStorage，
  // 后续刷新 / 重新打开标签页都复用同一个 ID。
  // 后端按 task_id 维护"首次分发给哪个 client_id"，因此：
  // - 同一 client（同一个人）刷新后能再次看到刚才他自己已经看过的帖子；
  // - 别的 client 看不到已被本人锁定的帖子，避免撞车。
  const CLIENT_ID = (() => {
    const KEY = 'banniu_review_client_id';
    const gen = () => {
      try {
        if (window.crypto && typeof window.crypto.randomUUID === 'function') return window.crypto.randomUUID();
      } catch (e) {}
      return `c-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 10)}`;
    };
    try {
      const exist = window.localStorage?.getItem(KEY);
      if (exist) return exist;
      const fresh = gen();
      window.localStorage?.setItem(KEY, fresh);
      return fresh;
    } catch (e) {
      return gen();
    }
  })();
  const rowsContainer = document.getElementById('rowsContainer');
  const paginateLoadingEl = document.getElementById('paginateLoading');
  const paginateSentinelEl = document.getElementById('paginateSentinel');
  let reachedEnd = false;
  let inFlight = false;
  let lastTotalMatched = 0;
  let lastFilterSignature = '';

  function revealImagesInRow(rowEl) {
    if (!rowEl) return;
    rowEl.querySelectorAll('img[data-src]').forEach((img) => {
      const src = img.dataset.src;
      if (src) {
        img.src = src;
        img.removeAttribute('data-src');
      }
    });
  }

  function syncFinalButtons(rowEl) {
    if (!rowEl) return;
    const val = rowEl.dataset.finalApproved || '';
    rowEl.querySelectorAll('.final-btn').forEach((b) => {
      b.classList.toggle('active', (b.dataset.approved || '') === val);
    });
  }

  function collectMediaMarks(rowEl) {
    const mediaMarks = {};
    if (!rowEl) return mediaMarks;
    rowEl.querySelectorAll('.thumb-btn').forEach((thumb) => {
      const mediaUrl = thumb.dataset.originalUrl || thumb.dataset.url || '';
      const key = thumb.dataset.markKey || '';
      if (!mediaUrl || !key) return;
      let label = '';
      if (badSet.has(key)) label = '不符合';
      else if (goodSet.has(key)) label = '符合';
      mediaMarks[mediaUrl] = label;
    });
    return mediaMarks;
  }

  function getCurrentFilters() {
    return {
      keyword: (searchKeyword?.value || '').trim(),
      product_model: (filterProductModel?.value || '').trim(),
      created_start: (filterCreatedStart?.value || '').trim(),
      created_end: (filterCreatedEnd?.value || '').trim(),
      review_status: (filterReviewStatus?.value || '').trim(),
      task_status: (filterTaskStatus?.value || '').trim(),
      final_approved: (filterFinalApproved?.value || '').trim(),
      reviewer: (filterReviewer?.value || '').trim(),
    };
  }

  function getFilterSignature() {
    return JSON.stringify(getCurrentFilters());
  }

  function updateSearchSummary() {
    if (!searchSummary) return;
    const f = getCurrentFilters();
    const visible = rowsContainer.querySelectorAll('.row').length;
    const parts = [`已加载 ${visible} 条，匹配总数 ${lastTotalMatched}`];
    if (f.keyword) parts.push(`关键词「${f.keyword}」`);
    if (f.product_model) parts.push(`型号=${f.product_model}`);
    if (f.review_status) parts.push(`审核=${f.review_status}`);
    if (f.task_status) parts.push(`任务=${f.task_status}`);
    if (f.final_approved) parts.push(`终审=${f.final_approved}`);
    if (f.reviewer) parts.push(`审核员=${f.reviewer}`);
    if (f.created_start || f.created_end) parts.push('已限创建时间');
    searchSummary.textContent = parts.join(' · ');
    if (searchEmptyHint) {
      searchEmptyHint.classList.toggle('show', lastTotalMatched > 0 && visible === 0);
    }
  }

  function updatePaginateLoading() {
    if (!paginateLoadingEl) return;
    if (inFlight) {
      paginateLoadingEl.classList.add('show');
      paginateLoadingEl.textContent = '加载中…';
    } else if (reachedEnd) {
      const total = rowsContainer.querySelectorAll('.row').length;
      if (total > 0) {
        paginateLoadingEl.classList.add('show');
        paginateLoadingEl.textContent = '已加载全部';
      } else {
        paginateLoadingEl.classList.remove('show');
      }
    } else {
      paginateLoadingEl.classList.remove('show');
    }
  }

  async function fetchNextRows({ reset = false, limit = PAGE_SIZE } = {}) {
    if (!rowsContainer) return;
    if (inFlight) return;
    const signature = getFilterSignature();
    if (reset) {
      lastFilterSignature = signature;
      rowsContainer.innerHTML = '';
      reachedEnd = false;
      lastTotalMatched = 0;
      buildFlatList();
      if (mask.classList.contains('show')) closeViewer();
    } else if (signature !== lastFilterSignature) {
      return;
    }
    if (reachedEnd) {
      updatePaginateLoading();
      updateSearchSummary();
      return;
    }
    const excludeTaskIds = Array.from(rowsContainer.querySelectorAll('.row'))
      .map((r) => r.dataset.taskId || '')
      .filter(Boolean);
    inFlight = true;
    updatePaginateLoading();
    try {
      const body = {
        ...getCurrentFilters(),
        client_id: CLIENT_ID,
        limit,
        exclude_task_ids: excludeTaskIds,
      };
      const result = await callApi('/api/next-rows', body);
      if (signature !== lastFilterSignature) return;
      lastTotalMatched = Number(result?.total_matched || 0);
      reachedEnd = !!result?.reached_end;
      const items = Array.isArray(result?.rows) ? result.rows : [];
      for (const item of items) {
        if (!item || !item.html) continue;
        const tpl = document.createElement('template');
        tpl.innerHTML = item.html.trim();
        const rowEl = tpl.content.firstElementChild;
        if (!rowEl) continue;
        rowsContainer.appendChild(rowEl);
        revealImagesInRow(rowEl);
        syncFinalButtons(rowEl);
        ensureAutoCheckedOnce(rowEl);
      }
      buildFlatList();
      syncMarks();
    } catch (err) {
      console.warn('fetchNextRows failed:', err);
      if (paginateLoadingEl) {
        paginateLoadingEl.classList.add('show');
        paginateLoadingEl.textContent = `加载失败：${err?.message || err}`;
      }
    } finally {
      inFlight = false;
      updatePaginateLoading();
      updateSearchSummary();
    }
  }

  function reloadRows() {
    saveFiltersToStorage();
    fetchNextRows({ reset: true, limit: PAGE_SIZE });
  }

  filterSearchBtn?.addEventListener('click', () => reloadRows());
  searchKeyword?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      reloadRows();
    }
  });
  [filterProductModel, filterReviewStatus, filterTaskStatus, filterFinalApproved,
   filterReviewer, filterCreatedStart, filterCreatedEnd].forEach((el) => {
    el?.addEventListener('change', () => reloadRows());
  });

  filterResetBtn?.addEventListener('click', () => {
    if (searchKeyword) searchKeyword.value = '';
    if (filterProductModel) filterProductModel.value = '';
    if (filterCreatedStart) filterCreatedStart.value = '';
    if (filterCreatedEnd) filterCreatedEnd.value = '';
    if (filterReviewStatus) filterReviewStatus.value = '';
    if (filterTaskStatus) filterTaskStatus.value = '';
    if (filterFinalApproved) filterFinalApproved.value = 'none';
    if (filterReviewer) filterReviewer.value = '';
    reloadRows();
  });

  if (paginateSentinelEl && 'IntersectionObserver' in window) {
    const io = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (!entry.isIntersecting) return;
        if (inFlight || reachedEnd) return;
        if (rowsContainer.querySelectorAll('.row').length === 0) return;
        fetchNextRows({ reset: false, limit: PAGE_SIZE });
      });
    }, { rootMargin: '300px 0px' });
    io.observe(paginateSentinelEl);
  }

  async function postSubmitRow(body) {
    return await callApi('/api/submit-row', body);
  }

  async function handleSaveMedia(btn) {
    const sourceFile = btn.dataset.sourceFile || '';
    if (!sourceFile || btn.disabled) return;
    const rowEl = btn.closest('.row');
    const finalVal = rowEl?.dataset.finalApproved || '';
    const finalRow = rowEl?.querySelector('.final-decision-row');
    const reasonEl = rowEl?.querySelector('.review-reason');
    const reason = (reasonEl?.value || '').trim();
    // 必须完成「人工终审」才允许提交
    if (finalVal !== 'true' && finalVal !== 'false') {
      finalRow?.classList.add('invalid');
      finalRow?.scrollIntoView({ block: 'nearest' });
      window.alert('请先完成「人工终审」（选择审核通过或审核不通过）。');
      return;
    }
    finalRow?.classList.remove('invalid');
    // 审核不通过必须填写备注（回复用户）
    if (finalVal === 'false' && !reason) {
      reasonEl?.classList.add('invalid');
      reasonEl?.focus();
      window.alert('选择「审核不通过」时，必须填写备注（回复用户）。');
      return;
    }
    reasonEl?.classList.remove('invalid');
    const oldText = btn.textContent;
    btn.disabled = true;
    btn.textContent = '保存中...';
    try {
      const body = { source_file: sourceFile, media_marks: collectMediaMarks(rowEl) };
      if (finalVal === 'true') {
        body.approved = true;
        body.reason = reason;
      } else if (finalVal === 'false') {
        body.approved = false;
        body.reason = reason;
      }
      await postSubmitRow(body);
      btn.textContent = '已保存';
      if (rowEl) {
        rowEl.style.maxHeight = rowEl.offsetHeight + 'px';
        requestAnimationFrame(() => rowEl.classList.add('removing'));
        setTimeout(() => {
          rowEl.remove();
          buildFlatList();
          updateSearchSummary();
          // 移除一行后向后端再补一条
          if (!reachedEnd) fetchNextRows({ reset: false, limit: 1 });
          else if (!rowsContainer.querySelector('.row')) updateSearchSummary();
        }, 320);
      }
    } catch (err) {
      btn.disabled = false;
      btn.textContent = oldText || '保存图片/视频标注';
      window.alert(`保存失败：${err?.message || err}`);
    }
  }

  function escapeAttr(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function enterBanniuEdit(aside) {
    if (!aside || aside.classList.contains('editing')) return;
    aside.classList.add('editing');
    aside.querySelectorAll('.banniu-kv[data-editable="1"]').forEach((kv) => {
      const vEl = kv.querySelector('.v');
      if (!vEl) return;
      const original = kv.dataset.originalValue || '';
      kv.dataset.displayHtml = vEl.innerHTML;
      vEl.innerHTML = `<input type="text" class="banniu-input" value="${escapeAttr(original)}" />`;
    });
    const editBtn = aside.querySelector('.banniu-edit-btn');
    if (editBtn) editBtn.textContent = '保存';
    const cancelBtn = aside.querySelector('.banniu-cancel-btn');
    if (cancelBtn) cancelBtn.hidden = false;
  }

  function exitBanniuEdit(aside, { keepValues } = { keepValues: false }) {
    if (!aside) return;
    aside.classList.remove('editing');
    aside.querySelectorAll('.banniu-kv[data-editable="1"]').forEach((kv) => {
      const vEl = kv.querySelector('.v');
      if (!vEl) return;
      const input = vEl.querySelector('input.banniu-input');
      if (keepValues && input) {
        const newVal = input.value;
        kv.dataset.originalValue = newVal;
        vEl.textContent = newVal === '' ? '-' : newVal;
      } else if (kv.dataset.displayHtml !== undefined) {
        vEl.innerHTML = kv.dataset.displayHtml;
      }
      delete kv.dataset.displayHtml;
    });
    const editBtn = aside.querySelector('.banniu-edit-btn');
    if (editBtn) {
      editBtn.textContent = '编辑';
      editBtn.disabled = false;
    }
    const cancelBtn = aside.querySelector('.banniu-cancel-btn');
    if (cancelBtn) cancelBtn.hidden = true;
  }

  // 只收集「输入值 vs 进入编辑态时的 data-original-value 不一致」的字段。
  // 用户没动过的 input 一律跳过，避免给班牛回写无意义的字段；
  // 这也直接决定了 POST /api/update-banniu 的 body —— 实际下发的就是 diff。
  function collectChangedBanniuFields(aside) {
    const changed = {};
    if (!aside) return changed;
    aside.querySelectorAll('.banniu-kv[data-editable="1"]').forEach((kv) => {
      const key = kv.dataset.banniuKey || '';
      const input = kv.querySelector('input.banniu-input');
      if (!key || !input) return;
      const newVal = input.value;
      const originalVal = kv.dataset.originalValue || '';
      if (newVal === originalVal) return;
      changed[key] = newVal;
    });
    return changed;
  }

  async function submitBanniuEdit(aside) {
    if (!aside) return;
    const sourceFile = aside.dataset.sourceFile || '';
    const editBtn = aside.querySelector('.banniu-edit-btn');
    if (!sourceFile || !editBtn) return;

    const changedFields = collectChangedBanniuFields(aside);
    if (!Object.keys(changedFields).length) {
      // 没有任何字段被改过：直接退出编辑态，不发请求、不打扰班牛侧。
      exitBanniuEdit(aside, { keepValues: false });
      return;
    }
    editBtn.disabled = true;
    editBtn.textContent = '保存中…';
    try {
      await callApi('/api/update-banniu', { source_file: sourceFile, fields: changedFields });
      exitBanniuEdit(aside, { keepValues: true });
    } catch (err) {
      editBtn.disabled = false;
      editBtn.textContent = '保存';
      window.alert(`更新失败：${err?.message || err}`);
    }
  }

  rowsContainer?.addEventListener('click', (e) => {
    const target = e.target;
    if (!(target instanceof Element)) return;

    const banniuEditBtn = target.closest('.banniu-edit-btn');
    if (banniuEditBtn && rowsContainer.contains(banniuEditBtn)) {
      e.preventDefault();
      e.stopPropagation();
      const aside = banniuEditBtn.closest('.post-banniu');
      if (!aside) return;
      if (aside.classList.contains('editing')) submitBanniuEdit(aside);
      else enterBanniuEdit(aside);
      return;
    }

    const banniuCancelBtn = target.closest('.banniu-cancel-btn');
    if (banniuCancelBtn && rowsContainer.contains(banniuCancelBtn)) {
      e.preventDefault();
      e.stopPropagation();
      const aside = banniuCancelBtn.closest('.post-banniu');
      if (aside) exitBanniuEdit(aside, { keepValues: false });
      return;
    }

    const markBtn = target.closest('.mark-btn');
    if (markBtn && rowsContainer.contains(markBtn)) {
      e.stopPropagation();
      e.preventDefault();
      const key = markBtn.dataset.markKey || '';
      if (!key) return;
      if (badSet.has(key)) badSet.delete(key);
      else { badSet.add(key); goodSet.delete(key); }
      saveMarks();
      syncMarks();
      scheduleAutoCheck(markBtn.closest('.row'));
      return;
    }

    const banniuThumb = target.closest('.banniu-thumb-btn');
    if (banniuThumb && rowsContainer.contains(banniuThumb)) {
      e.preventDefault();
      e.stopPropagation();
      openBanniuViewer(banniuThumb.dataset.viewerSrc || banniuThumb.dataset.url || '');
      return;
    }

    const thumbBtn = target.closest('.thumb-btn');
    if (thumbBtn && rowsContainer.contains(thumbBtn)) {
      e.preventDefault();
      const markKey = thumbBtn.dataset.markKey || '';
      const idx = flatList.findIndex((x) => x.markKey === markKey);
      openViewer(idx >= 0 ? idx : 0);
      return;
    }

    const finalBtn = target.closest('.final-btn');
    if (finalBtn && rowsContainer.contains(finalBtn)) {
      const rowEl = finalBtn.closest('.row');
      if (!rowEl) return;
      const val = finalBtn.dataset.approved || '';
      rowEl.dataset.finalApproved = rowEl.dataset.finalApproved === val ? '' : val;
      // 切换为「不通过」以外的状态时移除必填红边
      if (rowEl.dataset.finalApproved !== 'false') {
        rowEl.querySelector('.review-reason')?.classList.remove('invalid');
      }
      // 已做出终审决策时移除终审必填红边
      if (rowEl.dataset.finalApproved === 'true' || rowEl.dataset.finalApproved === 'false') {
        rowEl.querySelector('.final-decision-row')?.classList.remove('invalid');
      }
      syncFinalButtons(rowEl);
      syncFinalSuggestMatched(rowEl);
      return;
    }

    const saveBtn = target.closest('.save-media-btn');
    if (saveBtn && rowsContainer.contains(saveBtn)) {
      handleSaveMedia(saveBtn);
      return;
    }
  });

  rowsContainer?.addEventListener('input', (e) => {
    const target = e.target;
    if (!(target instanceof Element)) return;
    if (target.matches('.review-reason')) {
      const rowEl = target.closest('.row');
      if (!rowEl) return;
      // 用户开始输入后清除"必填未填"红边提示
      if ((target.value || '').trim()) target.classList.remove('invalid');
    }
  });

  loadMarks();
  syncMarks();
  restoreFiltersFromStorage();
  setupDateAutoTime(filterCreatedStart, '00:00');
  setupDateAutoTime(filterCreatedEnd, '23:59');
  reloadRows();
})();
</script>
</body>
</html>
